<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register — Smart Task Manager</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="auth-body">
<div class="auth-container">
  <div class="auth-card">
    <div class="auth-logo">📋</div>
    <h1 class="auth-title">Create Account</h1>
    <p class="auth-subtitle">Join Smart Task Manager</p>

    {% if error %}
    <div class="alert-error">⚠️ {{ error }}</div>
    {% endif %}

    <form method="POST" action="/register">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" name="username" placeholder="Enter your full name" required>
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" placeholder="Enter your email" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Create a password" required>
      </div>
      <button type="submit" class="btn-auth">✅ Create Account</button>
    </form>

    <p class="auth-switch">Already have an account? <a href="/login">Login here</a></p>
  </div>
</div>
</body>
</html>
